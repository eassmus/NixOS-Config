$font = Monospace

general {
    hide_cursor = true
    screencopy_mode=1
    ignore_empty_input=true
}

pam {
    enabled = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    animation = fadeIn, 1, 5, smoothIn
    animation = fadeOut, 1, 5, smoothOut
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor = 
    path = ~/Wallpapers/Active/winter_mountain.jpg
    blur_passes = 1
    blur_size = 1
    noise = 0.0
    brightness = 0.95
    contrast = 1.0
}

input-field {
    monitor =
    size = 590, 5%
    outline_thickness = 6
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgba(82aee8ff) rgba(e9a6fdff) 90deg
    check_color = rgba(82aee8ff) rgba(e9a6fdff) 90deg
    #fail_color = rgba(f34646ff) rgba(f34646ff) 90deg

    font_color = rgba(e9a6fdff)
    fade_on_empty = false
    rounding = 10

    font_family = $font
    placeholder_text = 
    fail_text = 

    # uncomment if you wish to display a message during authentication
    # check_text = Authenticating...

    # uncomment to use a letter instead of a dot to indicate the typed password
    dots_text_format = 
    dots_size = 0.5
    dots_spacing = 0.3

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 0, 0
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M" # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 90
    font_family = $font
    color = rgba(e9a6fdff)

    position = 0, 120
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d %Y" # update every 60 seconds
    font_size = 25
    font_family = $font
    color = rgba(82aee8ff) 

    position = 0, -80
    halign = center
    valign = center
}

# STAR
label {
    monitor =
    text = 
    font_size = 90
    font_family = $font
    color = rgba(e9a6fdff) 

    position = 0, +250
    halign = center
    valign = center
}

